# version: '3.8'

services:

#------------------------------------------------------------------------------#
#                               BACKEND
  backend:
    image: backend:1.0
    build:
      dockerfile: ./docker/backend_docker/dockerfile
    container_name: backend-container
    volumes:
      - ./src/backend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - transcendence


#------------------------------------------------------------------------------#
#                               FRONTEND
  frontend:
    image: frontend:1.0
    build:
      dockerfile: ./docker/frontend_docker/dockerfile
    container_name: frontend-container
    volumes:
      - ./src/frontend:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - transcendence


#------------------------------------------------------------------------------#
#                               NGINX
  nginx:
    depends_on:
      - frontend
    image: nginx:1.0
    build: 
      dockerfile: ./docker/nginx_docker/dockerfile
    container_name: nginx-container
    ports:
      - 8080:8080
    networks:
      - transcendence



#------------------------------------------------------------------------------#
#                               NETWORKS
networks:
  transcendence:
    driver: bridge